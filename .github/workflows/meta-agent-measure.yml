name: meta-agent-measure

# Fires when a meta-agent/* PR is merged to master. Snapshots the pre-merge
# eval-score baseline into the proposal row so the weekly cron's measurement
# pass has a stable "before" window to compare against. The actual
# measurement (and any auto-revert) happens later in meta-agent-cron.yml,
# once enough post-merge runs have accumulated.

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  snapshot-baseline:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'meta-agent/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[semantic,web,report,mcp,dev]"

      - name: Snapshot the pre-merge baseline
        run: >-
          python -m meta.measure --snapshot
          --pr ${{ github.event.pull_request.number }}
          --sha ${{ github.event.pull_request.merge_commit_sha }}
          --merged-at ${{ github.event.pull_request.merged_at }}
