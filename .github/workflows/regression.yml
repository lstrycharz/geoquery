name: regression

on:
  pull_request:
  push:
    branches: [main, master]

# Cancel an in-flight run when a new commit lands on the same PR. Cheaper +
# the new commit's result is the only one we care about.
concurrency:
  group: regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    permissions:
      # Default workflow token can comment on PRs from the same repo. Required
      # for the per-PR summary comment step at the end.
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          # `memory/__init__.py` imports `memory.semantic` which top-level
          # imports `sqlite_vec`; `tools/web_fetch.py` imports `readability`.
          # We can't get away with just `[dev]` — the entire `memory` package
          # would fail to import. `[semantic,web,report,mcp,dev]` is the
          # minimum that keeps every test importable. We skip `[dashboard]`
          # — streamlit + pandas are heavy and the regression tests don't
          # need them.
          pip install -e ".[semantic,web,report,mcp,dev]"

      - name: Default pytest (includes the 5 smoke regression cases)
        # This produces ~10s of run time and is the same suite a developer
        # runs locally. Smoke tier is in default `pytest` because it's fast
        # and gives high signal.
        run: pytest --junitxml=junit-smoke.xml

      - name: Full regression tier (~25 cases, opt-in locally; mandatory in CI)
        run: pytest -m regression_full --junitxml=junit-full.xml

      - name: Upload junit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ github.run_id }}
          path: |
            junit-smoke.xml
            junit-full.xml
          retention-days: 14

      - name: Generate PR summary
        if: always()
        run: |
          python scripts/regression_summary.py \
            --smoke-xml junit-smoke.xml \
            --full-xml junit-full.xml \
            --baseline-ref ${{ github.event.pull_request.base.sha || 'HEAD~1' }} \
            > regression-summary.md
          # Echo the summary into the GitHub Actions step summary so the
          # workflow page itself shows the breakdown without a click.
          cat regression-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with regression summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('regression-summary.md', 'utf-8');
            // Find the previous bot comment so we can update it instead of
            // posting a new one on every push. Saves PR-comment noise.
            const marker = '<!-- regression-gate-summary -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const prior = comments.find(c => c.body && c.body.includes(marker));
            const composed = `${marker}\n${body}`;
            if (prior) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prior.id,
                body: composed,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: composed,
              });
            }
